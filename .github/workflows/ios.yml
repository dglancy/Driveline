name: Build & Test

on:
  push:

permissions:
  contents: read
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cache SPM packages
        uses: actions/cache@v5
        with:
          path: ~/.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.5.app

      - name: Build & Test
        run: |
          set -o pipefail
          rm -rf TestResults.xcresult
          xcodebuild test \
            -project Driveline.xcodeproj \
            -scheme Driveline \
            -destination 'platform=iOS Simulator,name=iPhone 17,arch=arm64' \
            -testPlan Driveline \
            -skipPackagePluginValidation \
            -resultBundlePath TestResults.xcresult \
            | xcpretty

      - name: Install xcresultparser
        if: always()
        run: brew install a7ex/homebrew-formulae/xcresultparser

      - name: Convert test results to JUnit
        if: always()
        run: xcresultparser --output-format junit TestResults.xcresult > TestResults.xml

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: iOS Tests
          path: TestResults.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: TestResults.xcresult
