name: Build & Test

on:
  push:

permissions:
  contents: read
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios-app-test:
    name: iOS App Tests
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cache SPM packages
        uses: actions/cache@v5
        with:
          path: ~/.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.5.app

      - name: Build & Test
        run: |
          set -o pipefail
          rm -rf TestResults.xcresult
          xcodebuild test \
            -project Driveline.xcodeproj \
            -scheme Driveline \
            -destination 'platform=iOS Simulator,name=iPhone 17,arch=arm64' \
            -testPlan Driveline \
            -skipPackagePluginValidation \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult \
            | xcpretty

      - name: Install xcresultparser
        if: always()
        run: brew install a7ex/homebrew-formulae/xcresultparser

      - name: Convert test results to JUnit
        if: always()
        run: xcresultparser --output-format junit TestResults.xcresult > TestResults.xml

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: iOS Tests
          path: TestResults.xml
          reporter: java-junit
          fail-on-error: false

      - name: Report code coverage
        if: always()
        run: |
          REPORT=$(xcrun xccov view --report --json TestResults.xcresult)
          {
            echo "## Code Coverage"
            echo ""
            OVERALL=$(echo "$REPORT" | jq -r '
              [.targets[] | select(.name | endswith(".xctest") | not)] as $t
              | ([$t[].coveredLines] | add) as $covered
              | ([$t[].executableLines] | add) as $exec
              | (($covered / $exec) * 1000 | round) / 10
            ')
            echo "**Overall line coverage: ${OVERALL}%**"
            echo ""
            echo "| Target | Coverage |"
            echo "|---|---|"
            echo "$REPORT" | jq -r '.targets[] | select(.name | endswith(".xctest") | not) | "| \(.name) | \((.lineCoverage * 1000 | round) / 10)% |"'
            echo ""
            echo "<details><summary>Lowest covered files</summary>"
            echo ""
            echo "| File | Coverage | Lines |"
            echo "|---|---|---|"
            echo "$REPORT" | jq -r '
              [.targets[] | select(.name | endswith(".xctest") | not) | .files[] | select(.executableLines > 0)]
              | sort_by(.lineCoverage)
              | .[:25]
              | .[]
              | "| \(.name) | \((.lineCoverage * 1000 | round) / 10)% | \(.coveredLines)/\(.executableLines) |"
            '
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: TestResults.xcresult

